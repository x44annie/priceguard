services:
  pgdb:
    container_name: priceguard_db
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_URL}
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U youruser -d yourdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - priceguard

  backend:
    container_name: priceguard_backend
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8081:8081"
    depends_on:
      pgdb:
        condition: service_healthy
    networks:
      - priceguard

networks:
  priceguard:
    driver: bridge